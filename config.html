<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>论坛自动化 - 配置</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #f5f5f7;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    color: #1A1A2E;
  }

  .card {
    background: #ffffff;
    border-radius: 8px;
    box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    width: 100%;
    max-width: 520px;
    padding: 32px;
  }

  h1 {
    font-size: 22px;
    font-weight: 600;
    color: #1A1A2E;
    margin-bottom: 24px;
    text-align: center;
  }

  .group {
    margin-bottom: 24px;
  }

  .group-title {
    font-size: 14px;
    font-weight: 600;
    color: #1A1A2E;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid #e8e8ed;
  }

  .field {
    margin-bottom: 16px;
  }

  .field:last-child {
    margin-bottom: 0;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: #1A1A2E;
    margin-bottom: 6px;
  }

  input {
    width: 100%;
    height: 40px;
    padding: 0 12px;
    font-size: 14px;
    font-family: inherit;
    color: #1A1A2E;
    background: #fafafa;
    border: 1px solid #e0e0e5;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input:focus {
    border-color: #007AFF;
    box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.1);
    background: #ffffff;
  }

  input::placeholder {
    color: #a0a0a8;
  }

  .btn {
    width: 100%;
    height: 44px;
    font-size: 15px;
    font-weight: 500;
    font-family: inherit;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background-color 0.2s, opacity 0.2s;
  }

  .btn-primary {
    background: #007AFF;
    color: #ffffff;
  }

  .btn-primary:hover {
    background: #0066d6;
  }

  .btn-primary:active {
    background: #0052b3;
  }

  .btn-primary:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .alert {
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 14px;
    margin-bottom: 16px;
    display: none;
    align-items: center;
    gap: 8px;
  }

  .alert.show {
    display: flex;
  }

  .alert-success {
    background: #f0fdf4;
    color: #166534;
    border: 1px solid #bbf7d0;
  }

  .alert-error {
    background: #fef2f2;
    color: #991b1b;
    border: 1px solid #fecaca;
  }

  .alert-icon {
    font-size: 18px;
    flex-shrink: 0;
  }

  .command-section {
    margin-top: 16px;
    padding: 16px;
    background: #fafafa;
    border-radius: 8px;
    border: 1px solid #e8e8ed;
    display: none;
  }

  .command-section.show {
    display: block;
  }

  .command-label {
    font-size: 12px;
    color: #6e6e76;
    margin-bottom: 8px;
  }

  .command-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .command-code {
    flex: 1;
    background: #1A1A2E;
    color: #ffffff;
    padding: 10px 14px;
    border-radius: 6px;
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    font-size: 13px;
    overflow-x: auto;
    white-space: nowrap;
  }

  .btn-copy {
    flex-shrink: 0;
    height: 36px;
    padding: 0 14px;
    font-size: 13px;
    font-weight: 500;
    font-family: inherit;
    background: #ffffff;
    color: #1A1A2E;
    border: 1px solid #d0d0d5;
    border-radius: 8px;
    cursor: pointer;
    transition: background-color 0.2s, border-color 0.2s;
  }

  .btn-copy:hover {
    background: #f5f5f7;
    border-color: #b0b0b5;
  }

  .btn-copy.copied {
    background: #f0fdf4;
    border-color: #bbf7d0;
    color: #166534;
  }

  .loading {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid #ffffff;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>
  <div class="card">
    <h1>论坛自动化 - 配置</h1>

    <div id="alertSuccess" class="alert alert-success">
      <span class="alert-icon">✓</span>
      <span id="successText">配置保存成功</span>
    </div>

    <div id="alertError" class="alert alert-error">
      <span class="alert-icon">✕</span>
      <span id="errorText">保存失败，请重试</span>
    </div>

    <form id="configForm">
      <div class="group">
        <div class="group-title">DeepSeek API 配置</div>
        <div class="field">
          <label for="DEEPSEEK_API_KEY">API 密钥</label>
          <input type="password" id="DEEPSEEK_API_KEY" name="DEEPSEEK_API_KEY" placeholder="请输入 DeepSeek API 密钥">
        </div>
        <div class="field">
          <label for="DEEPSEEK_BASE_URL">API 地址</label>
          <input type="text" id="DEEPSEEK_BASE_URL" name="DEEPSEEK_BASE_URL" placeholder="https://api.deepseek.com/v1">
        </div>
        <div class="field">
          <label for="DEEPSEEK_MODEL">模型名称</label>
          <input type="text" id="DEEPSEEK_MODEL" name="DEEPSEEK_MODEL" placeholder="deepseek-v4-flash">
        </div>
      </div>

      <div class="group">
        <div class="group-title">Discourse 论坛配置</div>
        <div class="field">
          <label for="DISCOURSE_BASE_URL">论坛地址</label>
          <input type="text" id="DISCOURSE_BASE_URL" name="DISCOURSE_BASE_URL" placeholder="https://forum.trae.cn">
        </div>
        <div class="field">
          <label for="TARGET_CATEGORY_URL">目标分类 URL</label>
          <input type="text" id="TARGET_CATEGORY_URL" name="TARGET_CATEGORY_URL" placeholder="https://forum.trae.cn/c/xxx/123">
        </div>
      </div>

      <div class="group">
        <div class="group-title">运行设置</div>
        <div class="field">
          <label for="MAX_COMMENTS_PER_RUN">最大评论数</label>
          <input type="number" id="MAX_COMMENTS_PER_RUN" name="MAX_COMMENTS_PER_RUN" min="1" placeholder="5">
        </div>
      </div>

      <button type="submit" class="btn btn-primary" id="saveBtn">保存配置</button>
    </form>

    <div class="command-section" id="commandSection">
      <div class="command-label">启动命令</div>
      <div class="command-row">
        <div class="command-code" id="commandText">python main_browser.py</div>
        <button type="button" class="btn-copy" id="copyBtn" onclick="copyCommand()">复制</button>
      </div>
    </div>
  </div>

<script>
  const form = document.getElementById('configForm');
  const saveBtn = document.getElementById('saveBtn');
  const alertSuccess = document.getElementById('alertSuccess');
  const alertError = document.getElementById('alertError');
  const commandSection = document.getElementById('commandSection');
  const copyBtn = document.getElementById('copyBtn');

  const fieldIds = [
    'DEEPSEEK_API_KEY',
    'DEEPSEEK_BASE_URL',
    'DEEPSEEK_MODEL',
    'DISCOURSE_BASE_URL',
    'TARGET_CATEGORY_URL',
    'MAX_COMMENTS_PER_RUN'
  ];

  async function loadConfig() {
    try {
      const res = await fetch('/api/config');
      if (!res.ok) throw new Error('加载失败');
      const data = await res.json();
      fieldIds.forEach(id => {
        const el = document.getElementById(id);
        if (el && data[id] !== undefined) {
          el.value = data[id];
        }
      });
    } catch (e) {
      console.error('加载配置失败:', e);
    }
  }

  function showSuccess(message) {
    alertSuccess.querySelector('#successText').textContent = message || '配置保存成功';
    alertSuccess.classList.add('show');
    alertError.classList.remove('show');
    commandSection.classList.add('show');
  }

  function showError(message) {
    alertError.querySelector('#errorText').textContent = message || '保存失败，请重试';
    alertError.classList.add('show');
    alertSuccess.classList.remove('show');
    commandSection.classList.remove('show');
  }

  function setLoading(loading) {
    saveBtn.disabled = loading;
    if (loading) {
      saveBtn.innerHTML = '<span class="loading"></span>保存中...';
    } else {
      saveBtn.textContent = '保存配置';
    }
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    setLoading(true);
    alertSuccess.classList.remove('show');
    alertError.classList.remove('show');
    commandSection.classList.remove('show');

    const data = {};
    fieldIds.forEach(id => {
      data[id] = document.getElementById(id).value;
    });

    try {
      const res = await fetch('/api/config', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      if (!res.ok) throw new Error('保存失败');
      const result = await res.json();
      if (result.success) {
        showSuccess();
      } else {
        showError();
      }
    } catch (err) {
      console.error(err);
      showError();
    } finally {
      setLoading(false);
    }
  });

  function copyCommand() {
    const text = document.getElementById('commandText').textContent;
    navigator.clipboard.writeText(text).then(() => {
      copyBtn.textContent = '已复制';
      copyBtn.classList.add('copied');
      setTimeout(() => {
        copyBtn.textContent = '复制';
        copyBtn.classList.remove('copied');
      }, 2000);
    }).catch(() => {
      const textarea = document.createElement('textarea');
      textarea.value = text;
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      document.body.removeChild(textarea);
      copyBtn.textContent = '已复制';
      copyBtn.classList.add('copied');
      setTimeout(() => {
        copyBtn.textContent = '复制';
        copyBtn.classList.remove('copied');
      }, 2000);
    });
  }

  loadConfig();
</script>
</body>
</html>
